<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chainsaw English - DEBUG v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Bangers&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        :root {
            --csm-white: #fafafa;
            --csm-black: #0a0a0a;
            --csm-orange: #ff6b00;
            --csm-yellow: #ffd60a;
            --csm-green: #00c853;
            --csm-red: #ff1744;
            --csm-blue: #00b0ff;
            --csm-purple: #7c4dff;
            --csm-gray: #2d2d2d;
        }

        html, body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--csm-black);
            color: var(--csm-black);
            height: 100%;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
        }

        .app-frame {
            width: 100%;
            height: 100%;
            height: 100dvh;
            max-width: 480px;
            margin: 0 auto;
            background: var(--csm-white);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .manga-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.05;
            background-image: radial-gradient(circle, #000 1px, transparent 1px);
            background-size: 6px 6px;
            z-index: 0;
        }

        .speed-lines {
            position: absolute;
            top: 0;
            right: 0;
            width: 150px;
            height: 150px;
            pointer-events: none;
            opacity: 0.1;
            background: repeating-linear-gradient(-45deg, transparent, transparent 5px, var(--csm-black) 5px, var(--csm-black) 7px);
            z-index: 1;
        }

        .page-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            z-index: 2;
            min-height: 0;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            padding: 8px 12px 12px 12px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            box-sizing: border-box;
        }

        .page.active {
            display: flex;
        }

        /* ========== 学习页面 ========== */
        .study-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 3px solid var(--csm-black);
            flex-shrink: 0;
        }

        .mode-toggle {
            display: flex;
            background: #e0e0e0;
            border: 2px solid var(--csm-black);
            border-radius: 20px;
            overflow: hidden;
        }

        .mode-btn {
            padding: 6px 14px;
            border: none;
            background: transparent;
            font-size: 0.75rem;
            font-weight: 900;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--csm-orange);
            color: white;
        }

        .progress-indicator {
            font-size: 0.85rem;
            font-weight: 900;
            font-family: 'Bangers', cursive;
            letter-spacing: 1px;
        }

        .favorite-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 36px;
            height: 36px;
            border: 2px solid var(--csm-black);
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            z-index: 10;
            transition: all 0.2s;
        }

        .favorite-btn.active {
            background: var(--csm-yellow);
        }

        .sentence-card {
            background: white;
            border: 3px solid var(--csm-black);
            padding: 10px 12px;
            margin-bottom: 8px;
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow-y: auto;
        }

        .sentence-card::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 15px solid var(--csm-black);
        }

        .sentence-card::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 12px solid white;
            z-index: 1;
        }

        .category-badge {
            display: inline-block;
            background: var(--csm-yellow);
            border: 2px solid var(--csm-black);
            padding: 2px 8px;
            font-size: 0.65rem;
            font-weight: 900;
            margin-bottom: 8px;
            align-self: flex-start;
            transform: rotate(-2deg);
            font-family: 'Bangers', cursive;
            letter-spacing: 1px;
        }

        .sentence-content {
            background: var(--csm-black);
            border: 3px solid var(--csm-black);
            padding: 12px 10px;
            text-align: center;
            margin-bottom: 8px;
            position: relative;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 复习模式下提示 */
        .recall-section {
            background: rgba(255,255,255,0.5);
            border: 2px solid var(--csm-gray);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .recall-click-area {
            text-align: center;
            padding: 20px;
        }

        .recall-hint {
            font-size: 0.85rem;
            color: var(--csm-gray);
            font-weight: 700;
        }

        .sentence-en {
            font-family: 'Noto Sans SC', 'Roboto', sans-serif;
            font-size: 1.3rem;
            color: white;
            margin-bottom: 4px;
            line-height: 1.3;
            letter-spacing: 0.5px;
            text-shadow: 2px 2px 0 rgba(255,107,0,0.5);
            font-weight: 700;
        }

        .sentence-cn {
            font-size: 1.1rem;
            color: #ccc;
            font-weight: 700;
        }

        .sentence-phonetic {
            font-size: 0.75rem;
            color: #888;
            font-style: italic;
            margin-top: 4px;
        }

        .hidden-content {
            filter: blur(8px);
            user-select: none;
            opacity: 0.3;
        }

        .audio-btn {
            width: 44px;
            height: 44px;
            border: 3px solid var(--csm-black);
            border-radius: 50%;
            background: var(--csm-orange);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            cursor: pointer;
            position: relative;
            box-shadow: 3px 3px 0 var(--csm-black);
            transition: all 0.1s;
            flex-shrink: 0;
        }

        .audio-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 var(--csm-black);
        }

        .audio-btn svg {
            width: 22px;
            height: 22px;
            fill: var(--csm-black);
        }

        .audio-btn.playing {
            animation: pulse 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .meaning-box {
            background: #f0f0f0;
            border-left: 4px solid var(--csm-orange);
            padding: 8px;
            margin-bottom: 8px;
        }

        .meaning-title {
            font-size: 0.6rem;
            color: #666;
            margin-bottom: 3px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .meaning-text {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--csm-black);
        }

        .example-box {
            background: white;
            border: 2px solid var(--csm-black);
            border-top-width: 4px;
            border-top-color: var(--csm-orange);
            padding: 8px;
            margin-bottom: 8px;
        }

        .example-title {
            font-size: 0.6rem;
            color: var(--csm-orange);
            margin-bottom: 3px;
            font-weight: 900;
            font-family: 'Bangers', cursive;
            letter-spacing: 1px;
        }

        .example-en {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 2px;
            color: var(--csm-black);
        }

        .example-cn {
            font-size: 0.7rem;
            color: #666;
        }

        .button-area {
            margin-top: 6px;
            padding-top: 8px;
        }

        .learn-buttons {
            display: flex;
            gap: 8px;
            margin-top: auto;
            flex-shrink: 0;
        }

        .nav-arrow-btn {
            flex: 1;
            padding: 10px 8px;
            border: 3px solid var(--csm-black);
            background: white;
            font-size: 0.85rem;
            font-weight: 900;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            box-shadow: 3px 3px 0 var(--csm-black);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .nav-arrow-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 var(--csm-black);
        }

        .nav-arrow-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* 复习模式 - 回想阶段 */
        .recall-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .recall-prompt {
            background: var(--csm-yellow);
            border: 3px solid var(--csm-black);
            padding: 12px;
            text-align: center;
            font-weight: 900;
            font-size: 0.9rem;
        }

        .recall-buttons {
            display: flex;
            gap: 10px;
        }

        .recall-btn {
            flex: 1;
            padding: 14px;
            border: 3px solid var(--csm-black);
            font-size: 0.9rem;
            font-weight: 900;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            box-shadow: 3px 3px 0 var(--csm-black);
            transition: all 0.1s;
        }

        .recall-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 var(--csm-black);
        }

        .recall-btn.yes {
            background: var(--csm-green);
            color: white;
        }

        .recall-btn.no {
            background: var(--csm-red);
            color: white;
        }

        /* 验证阶段 - 纯表情大按钮 */
        .verify-section {
            display: none;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .verify-section.show {
            display: flex;
        }

        .verify-title {
            display: none;
        }

        .verify-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            width: 100%;
        }

        .verify-btn {
            flex: 1;
            max-width: 80px;
            aspect-ratio: 1;
            padding: 0;
            border: 3px solid var(--csm-black);
            font-size: 2.5rem;
            line-height: 1;
            cursor: pointer;
            background: white;
            box-shadow: 4px 4px 0 var(--csm-black);
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .verify-btn:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }

        .verify-btn.mastered {
            background: linear-gradient(135deg, #00c853 0%, #69f0ae 100%);
        }

        .verify-btn.fuzzy {
            background: linear-gradient(135deg, #ffd60a 0%, #fff176 100%);
        }

        .verify-btn.forgot {
            background: linear-gradient(135deg, #ff1744 0%, #ff5252 100%);
        }

        /* ========== 进度页面 ========== */
        .progress-header {
            text-align: center;
            padding: 4px 0;
            margin-bottom: 6px;
            border-bottom: 2px solid var(--csm-black);
            flex-shrink: 0;
        }

        .progress-title {
            font-family: 'Bangers', cursive;
            font-size: 1.1rem;
            color: var(--csm-black);
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 var(--csm-orange);
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .stat-card {
            background: white;
            border: 2px solid var(--csm-black);
            padding: 6px 2px;
            text-align: center;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.15);
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--csm-orange);
            font-family: 'Bangers', cursive;
            letter-spacing: 1px;
        }

        .stat-label {
            font-size: 0.5rem;
            color: #666;
            margin-top: 1px;
            font-weight: 700;
        }

        /* 新日历样式 */
        .calendar-section {
            background: white;
            border: 2px solid var(--csm-black);
            padding: 6px;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.15);
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            flex-shrink: 0;
        }

        .calendar-month {
            font-size: 0.8rem;
            font-weight: 900;
            font-family: 'Bangers', cursive;
            letter-spacing: 1px;
        }

        .calendar-nav {
            display: flex;
            gap: 4px;
        }

        .calendar-nav-btn {
            width: 22px;
            height: 22px;
            border: 2px solid var(--csm-black);
            background: white;
            cursor: pointer;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            box-shadow: 2px 2px 0 var(--csm-black);
            transition: all 0.1s;
        }

        .calendar-nav-btn:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 1px;
            flex: 1;
            min-height: 0;
        }

        .calendar-day-header {
            text-align: center;
            font-size: 0.45rem;
            font-weight: 900;
            color: #666;
            padding: 1px;
            border-bottom: 1px solid var(--csm-black);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calendar-day {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            font-weight: 700;
            border: 1px solid #ddd;
            background: #f5f5f5;
            cursor: pointer;
            position: relative;
            padding: 1px;
            min-height: 0;
        }

        .calendar-day .day-number {
            font-size: 0.55rem;
            font-weight: 700;
            line-height: 1;
        }

        .calendar-day .day-marks {
            display: flex;
            gap: 1px;
            margin-top: 1px;
            height: 3px;
        }

        .calendar-day .day-mark {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            border: 1px solid var(--csm-black);
        }

        .calendar-day.today {
            border-color: var(--csm-orange);
            border-width: 2px;
            background: white;
        }

        .calendar-day.today .day-number {
            color: var(--csm-orange);
            font-size: 0.7rem;
        }

        .calendar-day.has-learn {
            background: #e8f5e9;
            border-color: var(--csm-green);
        }

        .calendar-day.has-review {
            background: #e3f2fd;
            border-color: var(--csm-blue);
        }

        .calendar-day.has-both {
            background: linear-gradient(135deg, #e8f5e9 50%, #e3f2fd 50%);
            border-color: var(--csm-purple);
        }

        .calendar-day.empty {
            background: transparent;
            border-color: transparent;
        }

        .legend {
            display: flex;
            gap: 8px;
            margin-top: 4px;
            justify-content: center;
            flex-wrap: wrap;
            padding-top: 4px;
            border-top: 1px dashed #ddd;
            flex-shrink: 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 0.55rem;
        }

        .legend-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            border: 1px solid var(--csm-black);
        }

        /* ========== 新型底部导航 ========== */
        .bottom-nav {
            display: flex;
            background: var(--csm-black);
            padding: 0 0 env(safe-area-inset-bottom) 0;
            z-index: 100;
            height: 56px;
            height: calc(56px + env(safe-area-inset-bottom));
            flex-shrink: 0;
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: transparent;
            font-family: 'Noto Sans SC', sans-serif;
            position: relative;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            width: 80%;
            height: 3px;
            background: transparent;
            transition: all 0.2s;
        }

        .nav-btn.active::before {
            background: var(--csm-orange);
        }

        .nav-btn.active {
            background: #1a1a1a;
        }

        .nav-icon-svg {
            width: 24px;
            height: 24px;
            margin-bottom: 2px;
            fill: #666;
            transition: all 0.2s;
        }

        .nav-btn.active .nav-icon-svg {
            fill: var(--csm-orange);
            transform: scale(1.1);
        }

        .nav-label {
            font-size: 0.6rem;
            font-weight: 700;
            color: #666;
            transition: all 0.2s;
        }

        .nav-btn.active .nav-label {
            color: var(--csm-orange);
        }

        /* ========== 弹窗 ========== */
        .hint-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .hint-overlay.show {
            display: flex;
        }

        .hint-content {
            background: white;
            border: 4px solid var(--csm-black);
            padding: 20px;
            text-align: center;
            max-width: 280px;
            box-shadow: 8px 8px 0 var(--csm-orange);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .hint-title {
            font-family: 'Bangers', cursive;
            font-size: 1.3rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .hint-text {
            font-size: 0.8rem;
            margin-bottom: 14px;
            line-height: 1.5;
            color: #333;
        }

        .hint-close {
            padding: 8px 24px;
            border: 3px solid var(--csm-black);
            background: var(--csm-orange);
            font-size: 0.85rem;
            font-weight: 900;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            box-shadow: 3px 3px 0 var(--csm-black);
            transition: all 0.1s;
        }

        .hint-close:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 var(--csm-black);
        }

        /* 收藏列表 */
        .favorites-btn {
            position: fixed;
            top: 12px;
            right: 12px;
            width: 40px;
            height: 40px;
            border: 3px solid var(--csm-black);
            border-radius: 50%;
            background: var(--csm-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            z-index: 50;
            box-shadow: 3px 3px 0 var(--csm-black);
        }

        .favorites-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            z-index: 2000;
            padding: 60px 16px 20px;
            overflow-y: auto;
        }

        .favorites-overlay.show {
            display: block;
        }

        .favorites-header {
            color: white;
            font-family: 'Bangers', cursive;
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        .favorites-close {
            position: fixed;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border: 2px solid white;
            border-radius: 50%;
            background: transparent;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 2001;
        }

        .favorite-item {
            background: white;
            border: 3px solid var(--csm-black);
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .favorite-item-en {
            font-family: 'Bangers', cursive;
            font-size: 1rem;
            margin-bottom: 3px;
        }

        .favorite-item-cn {
            font-size: 0.75rem;
            color: #666;
        }

        /* 复习模式切换 */
        .review-mode-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            justify-content: center;
        }

        .review-mode-btn {
            padding: 8px 16px;
            border: 2px solid var(--csm-black);
            background: white;
            font-size: 0.75rem;
            font-weight: 900;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .review-mode-btn.active {

    els.studyPage.onclick = function(e) {

            // 如果点击的是按钮，不触发显示答案
            if (e.target.tagName === 'BUTTON' || e.target.closest('button')) {
                return;
            }
            showAnswer();
        }
    };

    // 评分按钮
    document.querySelectorAll('.verify-btn').forEach(btn => {
        btn.onclick = function() { markReview(this.dataset.status); };
    });
}

function loadData() {
    try {
        const saved = localStorage.getItem('chainsaw_data_v4');
        if (saved) {
            const data = JSON.parse(saved);
            phraseRecords = data.phraseRecords || {};
            dailyStats = data.dailyStats || {};
            favorites = new Set(data.favorites || []);

            // 恢复今天的已完成列表 - 确保总是初始化为 Set
            const today = getTodayStr();
            todayCompleted = new Set(); // 先重置
            todayViewed = new Set(); // 重置浏览记录

            // 兼容旧数据：如果 dailyStats[today] 存在但没有 completed 数组，尝试从 phraseRecords 恢复
            if (dailyStats[today]) {
                if (!dailyStats[today].completed) {
                    dailyStats[today].completed = [];
                    // 从 phraseRecords 中找出今天复习过的短语
                    for (const [id, record] of Object.entries(phraseRecords)) {
                        if (record.lastReviewDate === today) {
                            dailyStats[today].completed.push(parseInt(id));
                        }
                    }
                }
                if (!dailyStats[today].viewed) {
                    dailyStats[today].viewed = [];
                }
            }

            if (dailyStats[today] && dailyStats[today].completed && Array.isArray(dailyStats[today].completed)) {
                dailyStats[today].completed.forEach(id => todayCompleted.add(id));
            }
            if (dailyStats[today] && dailyStats[today].viewed && Array.isArray(dailyStats[today].viewed)) {
                dailyStats[today].viewed.forEach(id => todayViewed.add(id));
            }

            // 兼容旧数据（studyRecords 迁移到 phraseRecords）
            if (data.studyRecords && Object.keys(phraseRecords).length === 0) {
                migrateOldData(data.studyRecords);
            }

            // 恢复今天的第一句（优先未完成或今日计划中的）
            const todayPlan = getTodayPhrases();
            if (todayPlan.length > 0) {
                // 找到第一个未完成的
                const incomplete = todayPlan.find(idx => !todayCompleted.has(sentences[idx].id));
                currentIndex = incomplete !== undefined ? incomplete : todayPlan[0];
            } else if (data.currentIndex !== undefined && data.currentIndex >= 0 && data.currentIndex < sentences.length) {
                currentIndex = data.currentIndex;
            }
        }
    } catch (e) {
        console.error('Load error:', e);
    }
}

// 兼容旧数据迁移
function migrateOldData(oldRecords) {
    const today = getTodayStr();
    for (const [id, record] of Object.entries(oldRecords)) {
        const phraseId = parseInt(id);
        const isMastered = record.status === STATUS.MASTERED;
        phraseRecords[phraseId] = {
            level: isMastered ? 3 : 1,
            status: isMastered ? STATUS.MASTERED : STATUS.LEARNING,
            nextReviewDate: today,
            lastReviewDate: record.date || today,
            reviewCount: 1,
            firstLearnedDate: record.date || today
        };
    }
    studyRecords = oldRecords; // 保留旧记录
}

function saveData() {
    // 防抖：清除之前的定时器
    if (saveTimeout) {
        clearTimeout(saveTimeout);
    }
    // 延迟保存，减少频繁写入
    saveTimeout = setTimeout(() => {
        try {
            // 确保每日统计中包含 Set 的数据
            const today = getTodayStr();
            if (!dailyStats[today]) {
                dailyStats[today] = { newLearned: 0, reviewed: 0, completed: [], viewed: [] };
            }
            // 同步 todayCompleted 到 dailyStats
            dailyStats[today].completed = Array.from(todayCompleted);
            // 同步 todayViewed 到 dailyStats
            dailyStats[today].viewed = Array.from(todayViewed);

            localStorage.setItem('chainsaw_data_v4', JSON.stringify({
                phraseRecords: phraseRecords,
                dailyStats: dailyStats,
                favorites: Array.from(favorites), // Set 转为 Array
                currentIndex: currentIndex,
                studyRecords: studyRecords // 保留兼容
            }));
        } catch (e) {
            console.error('Save error:', e);
        }
        saveTimeout = null;
    }, 300); // 300ms 防抖
}

function showPage(page) {
    const isStudy = page === PAGES.STUDY;
    els.studyPage.classList.toggle('active', isStudy);
    els.progressPage.classList.toggle('active', !isStudy);
    els.navStudy.classList.toggle('active', isStudy);
    els.navProgress.classList.toggle('active', !isStudy);

    if (isStudy) {
        renderSentence();
    } else {
        renderCalendar();
        updateStats();
    }
}

function setMode(mode) {
    currentMode = mode;
    reviewStep = REVIEW_STEPS.RECALL;
    const isLearn = mode === MODES.LEARN;
    els.modeLearn.classList.toggle('active', isLearn);
    els.modeReview.classList.toggle('active', !isLearn);

    if (isLearn) {
        els.learnButtons.style.display = 'block';
        els.recallSection.style.display = 'none';
        els.verifySection.classList.remove('show');
        showAllContent();
    } else {
        els.learnButtons.style.display = 'none';
        els.recallSection.style.display = 'block';
        els.verifySection.classList.remove('show');
        setupRecallMode();
    }
}

function setupRecallMode() {
    reviewStep = REVIEW_STEPS.RECALL;
    // 随机选择隐藏中文或英文，让用户回想
    recallMode = Math.random() > 0.5 ? RECALL_MODES.EN : RECALL_MODES.CN;

    if (recallMode === RECALL_MODES.EN) {
        // 显示英文，隐藏中文
        els.sentenceEn.classList.remove('hidden-content');
        els.sentenceCn.classList.add('hidden-content');
    } else {
        // 显示中文，隐藏英文
        els.sentenceEn.classList.add('hidden-content');
        els.sentenceCn.classList.remove('hidden-content');
    }

    els.sentencePhonetic.style.display = 'none';
    els.meaningBox.style.display = 'none';
    els.exampleBox.style.display = 'none';
    els.audioBtn.style.display = 'none';
    els.recallSection.style.display = 'block';
    els.verifySection.classList.remove('show');
}

function showAnswer() {
    // 点击卡片显示答案，进入评分阶段
    if (currentMode === MODES.REVIEW && reviewStep === REVIEW_STEPS.RECALL) {
        reviewStep = REVIEW_STEPS.VERIFY;
        els.recallSection.style.display = 'none';
        els.verifySection.classList.add('show');
        showAllContent();
    }
}

function showAllContent() {
    els.sentenceEn.classList.remove('hidden-content');
    els.sentenceCn.classList.remove('hidden-content');
    els.sentencePhonetic.style.display = 'block';
    els.meaningBox.style.display = 'block';
    els.exampleBox.style.display = 'block';
    els.audioBtn.style.display = 'flex';
}

function renderSentence() {
    const s = sentences[currentIndex];
    const record = phraseRecords[s.id];
    const today = getTodayStr();

    // 如果是新词（从未学过的），记录为已浏览
    if (!record && !todayViewed.has(s.id)) {
        todayViewed.add(s.id);
        // 初始化今日统计
        if (!dailyStats[today]) {
            dailyStats[today] = { newLearned: 0, reviewed: 0, completed: [], viewed: [] };
        }
        if (!dailyStats[today].viewed) {
            dailyStats[today].viewed = [];
        }
        dailyStats[today].viewed.push(s.id);
        saveData();
        updateTodayProgress();
    }

    els.sentenceCategory.textContent = s.category;
    els.sentenceEn.textContent = s.en;
    els.sentenceCn.textContent = s.meaning.split('（')[0]; // 只显示主要意思
    els.sentencePhonetic.textContent = s.phonetic;
    els.sentenceMeaning.textContent = s.meaning;
    els.exampleEn.textContent = '"' + s.exampleEn + '"';
    els.exampleCn.textContent = s.exampleCn;

    // 显示今日进度
    const todayPlan = getTodayPhrases();
    // 已完成数量 - 使用复用函数
    const completedCount = getCompletedCount(todayPlan);
    // 右上角显示：已完成/今日总任务
    els.currentIndex.textContent = completedCount;
    els.totalCount.textContent = todayPlan.length;

    // 更新类别标签，显示是新学还是复习
    if (record) {
        if (record.nextReviewDate === today) {
            els.sentenceCategory.textContent = s.category + ' · 今日复习';
            els.sentenceCategory.style.color = 'var(--csm-orange)';
        } else {
            els.sentenceCategory.textContent = s.category + ' · 已学';
            els.sentenceCategory.style.color = 'var(--csm-green)';
        }
    } else {
        els.sentenceCategory.textContent = s.category + ' · 新词';
        els.sentenceCategory.style.color = 'var(--csm-blue)';
    }

    els.prevBtn.disabled = currentIndex === 0;
    els.nextBtn.disabled = currentIndex === sentences.length - 1;

    updateFavoriteBtn();
    updateTodayProgress();

    // 如果在复习模式，重新设置回想
    if (currentMode === MODES.REVIEW) {
        setMode('review');
    }
}

function prevSentence() {
    if (currentIndex > 0) {
        currentIndex--;
        saveData();
        renderSentence();
    }
}

function nextSentence() {
    if (currentIndex < sentences.length - 1) {
        currentIndex++;
        saveData();
        renderSentence();
    }
}

// 获取今天的日期字符串（带缓存）
function getTodayStr() {
    if (todayStrCache) return todayStrCache;
    const d = new Date();
    todayStrCache = d.toISOString().split('T')[0];
    return todayStrCache;
}

// 清除今日缓存（用于日期变化或新的一天）
function clearTodayCache() {
    todayStrCache = null;
    todayPhrasesCache = null;
}

// 获取给定日期后n天的日期字符串
function addDays(dateStr, days) {
    const d = new Date(dateStr);
    d.setDate(d.getDate() + days);
    return d.toISOString().split('T')[0];
}

// 获取今天需要学习的短语（优先复习到期的，然后新学15个）
function getTodayPhrases() {
    // 使用缓存，避免重复计算
    if (todayPhrasesCache) return todayPhrasesCache;

    const today = getTodayStr();
    const todayPhrases = [];
    const newPhrases = [];
    const reviewPhrases = [];

    // 先找出今天到期的复习
    for (let i = 0; i < sentences.length; i++) {
        const record = phraseRecords[sentences[i].id];
        if (record) {
            if (record.nextReviewDate === today) {
                reviewPhrases.push(i);
            }
        } else {
            // 新词
            newPhrases.push(i);
        }
    }

    // 今天需要复习的优先
    todayPhrases.push(...reviewPhrases);

    // 然后补充新词（最多15个）
    const todayStat = dailyStats[today] || { newLearned: 0, reviewed: 0 };
    const remainingNew = DAILY_NEW_LIMIT - todayStat.newLearned;

    if (remainingNew > 0 && newPhrases.length > 0) {
        const toLearn = newPhrases.slice(0, remainingNew);
        todayPhrases.push(...toLearn);
    }

    // 缓存结果
    todayPhrasesCache = todayPhrases;
    return todayPhrases;
}

// 获取已完成数量（复用逻辑）
function getCompletedCount(todayPlan) {
    if (!todayPlan) todayPlan = getTodayPhrases();
    let count = 0;
    for (const idx of todayPlan) {
        if (todayCompleted.has(sentences[idx].id)) count++;
    }
    return count;
}

// 标记复习结果
function markReview(status) {
    const s = sentences[currentIndex];
    const today = getTodayStr();

    // 检查是否今天第一次学习这个短语
    const isFirstTimeToday = !todayCompleted.has(s.id);

    // 获取或创建记录
    let record = phraseRecords[s.id];
    let isNewPhrase = false;
    if (!record) {
        // 新词第一次学习
        isNewPhrase = true;
        record = {
            level: 0,
            status: STATUS.LEARNING,
            nextReviewDate: addDays(today, REVIEW_INTERVALS[0]),
            lastReviewDate: today,
            reviewCount: 0,
            firstLearnedDate: today
        };
        phraseRecords[s.id] = record;
    }

    // 初始化今日统计
    if (!dailyStats[today]) {
        dailyStats[today] = { newLearned: 0, reviewed: 0, completed: [], viewed: [] };
    }
    // 确保 completed 数组存在（兼容旧数据）
    if (!dailyStats[today].completed) {
        dailyStats[today].completed = [];
    }
    // 确保 viewed 数组存在（兼容旧数据）
    if (!dailyStats[today].viewed) {
        dailyStats[today].viewed = [];
    }

    // 如果是今天第一次完成这个短语，更新统计
    if (isFirstTimeToday) {
        todayCompleted.add(s.id);
        dailyStats[today].completed.push(s.id);

        if (isNewPhrase) {
            dailyStats[today].newLearned++;
        }
        dailyStats[today].reviewed++;
    }

    // 根据评分更新记忆曲线
    record.lastReviewDate = today;
    record.reviewCount++;

    if (status === STATUS.MASTERED) {
        // 全对：升级
        record.level = Math.min(record.level + 1, 5);
        if (record.level >= 5) {
            record.status = STATUS.MASTERED;
        }
    } else if (status === STATUS.FUZZY) {
        // 模糊：保持当前level，但隔天再复习
        // level不变
    } else if (status === STATUS.FORGOT) {
        // 错了：降级到0，重新学习
        record.level = 0;
        record.status = STATUS.LEARNING;
    }

    // 清除缓存，因为数据已变化
    todayPhrasesCache = null;

    // 计算下次复习日期
    const interval = REVIEW_INTERVALS[record.level];
    record.nextReviewDate = addDays(today, interval);

    // 保存旧格式兼容
    studyRecords[s.id] = {
        status: status,
        date: today,
        en: s.en,
        isReview: record.reviewCount > 0
    };

    // 获取今天的学习计划并找到下一句（未完成的）
    const todayPlan = getTodayPhrases();
    const incompleteTask = todayPlan.find(idx => !todayCompleted.has(sentences[idx].id));

    if (incompleteTask !== undefined) {
        // 还有未完成的任务
        currentIndex = incompleteTask;
    } else if (todayPlan.length > 0) {
        // 今天任务全部完成
        showHint('今日任务完成！', '明天继续加油～');
        // 随机选一句已学的作为展示
        const learnedIds = Object.keys(phraseRecords).map(Number);
        if (learnedIds.length > 0) {
            const randomId = learnedIds[Math.floor(Math.random() * learnedIds.length)];
            currentIndex = sentences.findIndex(s => s.id === randomId);
        }
    } else {
        // 没有今日任务，随机选一句
        const learnedIds = Object.keys(phraseRecords).map(Number);
        if (learnedIds.length > 0) {
            const randomId = learnedIds[Math.floor(Math.random() * learnedIds.length)];
            currentIndex = sentences.findIndex(s => s.id === randomId);
        }
    }

    saveData();

    if (currentMode === MODES.REVIEW) {
        setMode('review');
    }

    renderSentence();
    renderCalendar();
    updateStats();
}

function playAudio() {
    const s = sentences[currentIndex];
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(s.en);
        utterance.lang = 'en-AU';
        utterance.rate = 0.8;
        els.audioBtn.classList.add('playing');
        utterance.onend = function() {
            els.audioBtn.classList.remove('playing');
        };
        window.speechSynthesis.speak(utterance);
    }
}

function toggleFavorite() {
    const s = sentences[currentIndex];
    const isFav = favorites.has(s.id);

    if (!isFav) {
        favorites.add(s.id);
        showHint('已收藏 ⭐', '这句话已添加到收藏列表');
    } else {
        favorites.delete(s.id);
        showHint('已取消收藏', '这句话已从收藏列表移除');
    }

    saveData();
    updateFavoriteBtn();
    setTimeout(closeHint, 800);
}

function updateFavoriteBtn() {
    const isFav = favorites.has(sentences[currentIndex].id);
    els.favoriteBtn.textContent = isFav ? '★' : '☆';
    els.favoriteBtn.classList.toggle('active', isFav);
}

function showFavorites() {
    els.favoritesList.innerHTML = '';

    if (favorites.size === 0) {
        const emptyMsg = document.createElement('div');
        emptyMsg.style.cssText = 'color:white;text-align:center;padding:20px;';
        emptyMsg.textContent = '还没有收藏任何句子';
        els.favoritesList.appendChild(emptyMsg);
    } else {
        favorites.forEach(id => {
            const s = sentences.find(x => x.id === id);
            if (s) {
                const item = document.createElement('div');
                item.className = 'favorite-item';

                const enDiv = document.createElement('div');
                enDiv.className = 'favorite-item-en';
                enDiv.textContent = s.en;

                const cnDiv = document.createElement('div');
                cnDiv.className = 'favorite-item-cn';
                cnDiv.textContent = s.meaning;

                item.appendChild(enDiv);
                item.appendChild(cnDiv);

                item.onclick = function() {
                    currentIndex = sentences.indexOf(s);
                    renderSentence();
                    hideFavorites();
                    showPage(PAGES.STUDY);
                };
                els.favoritesList.appendChild(item);
            }
        });
    }

    els.favoritesOverlay.classList.add('show');
}

function hideFavorites() {
    els.favoritesOverlay.classList.remove('show');
}

function showHint(title, text) {
    els.hintTitle.textContent = title;
    els.hintText.textContent = text;
    els.hintOverlay.classList.add('show');
}

function closeHint() {
    els.hintOverlay.classList.remove('show');
}

// 计算某日期需要复习的短语数量
function getReviewCountForDate(dateStr) {
    let count = 0;
    for (const record of Object.values(phraseRecords)) {
        if (record.nextReviewDate === dateStr) {
            count++;
        }
    }
    return count;
}

function updateStats() {
    const today = getTodayStr();
    const todayStat = dailyStats[today] || { newLearned: 0, reviewed: 0 };

    // 已掌握数量
    const mastered = Object.values(phraseRecords).filter(r => r.status === STATUS.MASTERED).length;
    // 已学总数（包括学习中）
    const total = Object.keys(phraseRecords).length;
    // 今天待复习数
    const todayReview = getReviewCountForDate(today);

    // 连续天数计算（基于dailyStats）
    const dates = Object.keys(dailyStats).sort();
    let streak = 0;

    // 检查今天或昨天是否有学习
    const hasToday = dates.includes(today);
    const yesterday = addDays(today, -1);
    const hasYesterday = dates.includes(yesterday);

    if (hasToday || hasYesterday) {
        streak = 1;
        // 从昨天往前检查
        let checkDate = yesterday;
        while (dates.includes(checkDate)) {
            streak++;
            checkDate = addDays(checkDate, -1);
        }
    }

    els.statStreak.textContent = streak;
    els.statTotal.textContent = total;
    els.statMastered.textContent = mastered;

    // 更新今日进度显示（如果存在）
    updateTodayProgress();
}

// 更新今日学习进度显示
function updateTodayProgress() {
    const today = getTodayStr();
    const todayStat = dailyStats[today] || { newLearned: 0, reviewed: 0, viewed: [] };
    const todayReview = getReviewCountForDate(today);

    // 检查是否已有今日进度元素
    let progressEl = document.getElementById('todayProgress');
    if (!progressEl) {
        progressEl = document.createElement('div');
        progressEl.id = 'todayProgress';
        progressEl.className = 'today-progress';
        progressEl.innerHTML = `
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText"></div>
        `;
        // 插入到学习卡片上方
        const card = document.getElementById('sentenceCard');
        if (card && card.parentNode) {
            card.parentNode.insertBefore(progressEl, card);
        }
    }

    // 今日进度：已完成数 / 今日全部任务数
    const todayPlan = getTodayPhrases();
    const completedCount = getCompletedCount(todayPlan);
    const total = todayPlan.length;
    const percent = total > 0 ? (completedCount / total * 100) : 100;

    // 新学进度：已浏览数 / 15（浏览过就算学了）
    const viewedCount = todayStat.viewed ? todayStat.viewed.length : 0;

    const fill = document.getElementById('progressFill');
    const text = document.getElementById('progressText');
    if (fill) fill.style.width = percent + '%';
    if (text) text.textContent = `今日进度: ${completedCount}/${total} | 复习${todayReview} | 新学${viewedCount}/15`;
}

function renderCalendar() {
    const year = currentMonth.getFullYear();
    const month = currentMonth.getMonth();
    els.calendarMonth.textContent = year + '年' + (month + 1) + '月';

    els.calendarGrid.innerHTML = '';

    const days = ['日', '一', '二', '三', '四', '五', '六'];
    days.forEach(d => {
        const div = document.createElement('div');
        div.className = 'calendar-day-header';
        div.textContent = d;
        els.calendarGrid.appendChild(div);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const todayDate = new Date();
    const todayDay = todayDate.getDate();
    const isCurrentMonth = todayDate.getMonth() === month && todayDate.getFullYear() === year;

    for (let i = 0; i < firstDay; i++) {
        const div = document.createElement('div');
        div.className = 'calendar-day empty';
        els.calendarGrid.appendChild(div);
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const div = document.createElement('div');
        div.className = 'calendar-day';

        // 构造日期字符串 YYYY-MM-DD
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

        // 计算该日期需要复习的数量
        const reviewCount = getReviewCountForDate(dateStr);

        // 获取该日期的学习统计
        const stat = dailyStats[dateStr];
        const hasLearn = stat && stat.newLearned > 0;
        const hasReviewDone = stat && stat.reviewed > 0;

        let dayClass = '';
        if (hasLearn && hasReviewDone) {
            dayClass = 'has-both';
        } else if (hasLearn) {
            dayClass = 'has-learn';
        } else if (hasReviewDone) {
            dayClass = 'has-review';
        }

        if (isCurrentMonth && day === todayDay) {
            dayClass += ' today';
        }

        div.className = 'calendar-day ' + dayClass;

        // 创建日期数字
        const dayNum = document.createElement('div');
        dayNum.className = 'day-number';
        dayNum.textContent = day;
        div.appendChild(dayNum);

        // 显示复习数量（如果有）
        if (reviewCount > 0) {
            const badge = document.createElement('div');
            badge.className = 'review-badge';
            badge.textContent = reviewCount;
            badge.style.cssText = `
                position: absolute;
                top: 1px;
                right: 1px;
                background: var(--csm-orange);
                color: white;
                font-size: 0.45rem;
                font-weight: 900;
                width: 12px;
                height: 12px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                border: 1px solid var(--csm-black);
            `;
            div.appendChild(badge);
        }

        // 创建标记点（已完成的）
        if (hasLearn || hasReviewDone) {
            const marks = document.createElement('div');
            marks.className = 'day-marks';
            if (hasLearn) {
                const mark = document.createElement('div');
                mark.className = 'day-mark';
                mark.style.background = 'var(--csm-green)';
                marks.appendChild(mark);
            }
            if (hasReviewDone) {
                const mark = document.createElement('div');
                mark.className = 'day-mark';
                mark.style.background = 'var(--csm-blue)';
                marks.appendChild(mark);
            }
            div.appendChild(marks);
        }

        els.calendarGrid.appendChild(div);
    }
}

function changeMonth(delta) {
    currentMonth.setMonth(currentMonth.getMonth() + delta);
    renderCalendar();
}

init();
